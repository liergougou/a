name: Deploy v3lclbshu App to GitHub Pages

on:
  push:
    branches:
      - main # 如果你的主分支叫 master，请改成 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js (版本 18 比较稳)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. 安装依赖
      - name: Install Dependencies
        run: npm ci

      # 4. 打包项目
      - name: Build
        run: npm run build

      # 5. 发布到 gh-pages 分支
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # ⚠️ 注意：Umi 默认打包到 dist 目录，所以这里写 ./dist
          publish_dir: ./dist
